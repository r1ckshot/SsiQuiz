<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="shell">
    <header id="hd"></header>
    <main id="app"></main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal" onclick="App.closeModal(event)">
    <div class="modal-panel" id="modal-panel">
      <div class="modal-hd">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" onclick="App.closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="confetti"></div>

  <script src="js/data/sections.js"></script>
  <script src="js/data/cheatsheets.js"></script>
  <script src="js/data/s1.js"></script>
  <script src="js/data/s2.js"></script>
  <script src="js/data/s3.js"></script>
  <script src="js/data/s4.js"></script>
  <script src="js/data/s5.js"></script>
  <script src="js/data/s6.js"></script>
  <script src="js/data/s7.js"></script>
  <script src="js/data/s8.js"></script>
  <script src="js/progress.js"></script>

  <script src="js/app.js"></script>
